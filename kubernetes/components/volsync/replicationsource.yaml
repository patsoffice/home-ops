---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/replicationsource_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: ${APP}
spec:
  sourcePVC: ${APP}
  trigger:
    # Staggered per-app to avoid a synchronized backup fan-out (see
    # scripts/volsync-schedules.py). Override is set in each app's
    # ks.yaml postBuild.substitute; default keeps the legacy top-of-hour.
    schedule: ${VOLSYNC_SCHEDULE:=0 * * * *}
  kopia:
    accessModes:
      - ${VOLSYNC_SNAP_ACCESSMODES:=ReadWriteOnce}
    cacheAccessModes:
      - ${VOLSYNC_CACHE_ACCESSMODES:=ReadWriteOnce}
    cacheCapacity: ${VOLSYNC_CACHE_CAPACITY:=5Gi}
    # Pin kopia's cache hard limits instead of the operator's auto-calc, which
    # allots metadata=70%/content=20% (90% of cacheCapacity) and leaves too
    # little headroom for kopia logs/temp/between-sweep overshoot — small cache
    # PVCs fill and backups fail with ENOSPC. We use content=20%/metadata=40%
    # (60% total, ~40% headroom). Defaults below are sized for the 5Gi default;
    # apps overriding VOLSYNC_CACHE_CAPACITY scale these in their ks.yaml.
    contentCacheSizeLimitMB: ${VOLSYNC_KOPIA_CONTENT_CACHE_MB:=1024}
    metadataCacheSizeLimitMB: ${VOLSYNC_KOPIA_METADATA_CACHE_MB:=2048}
    cacheStorageClassName: ${VOLSYNC_CACHE_SNAPSHOTCLASS:=ceph-block}
    compression: zstd-fastest
    copyMethod: Snapshot
    moverSecurityContext:
      runAsUser: ${VOLSYNC_PUID:=1000}
      runAsGroup: ${VOLSYNC_PGID:=1000}
      fsGroup: ${VOLSYNC_PGID:=1000}
    parallelism: 2
    repository: ${APP}-volsync-secret
    retain:
      hourly: 24
      daily: 7
    storageClassName: ${VOLSYNC_STORAGECLASS:=ceph-block}
    volumeSnapshotClassName: ${VOLSYNC_SNAPSHOTCLASS:=csi-ceph-blockpool}