
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-volsync"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: "${APP}-volsync-secret"
    template:
      data:
        KOPIA_PASSWORD: "{{ .KOPIA_PASSWORD }}"
        KOPIA_REPOSITORY: s3
        KOPIA_S3_BUCKET: volsync-kopia
        KOPIA_S3_ENDPOINT: nas0.internal:3900
        KOPIA_S3_DISABLE_TLS: "true"
        AWS_ACCESS_KEY_ID: "{{ .VOLSYNC_S3_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .VOLSYNC_S3_SECRET_ACCESS_KEY }}"
  dataFrom:
    - extract:
        key: volsync-template
