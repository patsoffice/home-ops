---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-authentik-security-policy
  annotations:
    policies.kyverno.io/title: Authentik SecurityPolicy for Envoy Gateway
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: HTTPRoute
    policies.kyverno.io/description: >-
      This policy generates an Envoy Gateway SecurityPolicy with extAuth
      configuration for HTTPRoutes annotated with
      `authentik.home.arpa/enabled: "true"`. The SecurityPolicy forwards
      authentication to the Authentik embedded outpost.
spec:
  generateExisting: true
  rules:
    - name: auth
      match:
        any:
          - resources:
              kinds:
                - HTTPRoute
              annotations:
                authentik.home.arpa/enabled: "true"
      generate:
        synchronize: true
        apiVersion: gateway.envoyproxy.io/v1alpha1
        kind: SecurityPolicy
        name: "authentik-{{ request.object.metadata.name }}"
        namespace: "{{ request.object.metadata.namespace }}"
        data:
          spec:
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: "{{ request.object.metadata.name }}"
            extAuth:
              http:
                backendRefs:
                  - name: authentik-outpost
                    namespace: network
                    kind: Backend
                    group: gateway.envoyproxy.io
                    port: 9000
                path: /outpost.goauthentik.io/auth/nginx
                headersToBackend:
                  - Cookie
                  - X-Forwarded-For
                  - X-Forwarded-Host
                  - X-Forwarded-Proto
