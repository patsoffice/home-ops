---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: ceph-csi-drivers
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    operatorConfig:
      driverSpecDefaults:
        clusterName: rook-ceph
        # Ceph runs host networking (CephCluster network.provider: host), so the
        # CSI controllers must use hostNetwork to reach the mons. Preserve the
        # replicas: 2 HA the bundled v1.19 csi-operator gave us.
        controllerPlugin:
          hostNetwork: true
          replicas: 2
    drivers:
      rbd:
        enabled: true
        name: rook-ceph.rbd.csi.ceph.com
        snapshotPolicy: volumeSnapshot
        controllerPlugin:
          hostNetwork: true
          replicas: 2
      cephfs:
        enabled: true
        name: rook-ceph.cephfs.csi.ceph.com
        snapshotPolicy: volumeGroupSnapshot
        kernelMountOptions:
          ms_mode: prefer-crc
        controllerPlugin:
          hostNetwork: true
          replicas: 2
      nfs:
        enabled: false
      nvmeof:
        enabled: false
