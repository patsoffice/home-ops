---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: daily
  namespace: volsync-system
spec:
  enabled: true
  # Retain ~10 days of maintenance Jobs (runs every 8h → 3/day) so the kopia
  # index-blob trend is observable across a full week+ rather than ~1 day.
  successfulJobsHistoryLimit: 30
  trigger:
    schedule: 30 */8 * * *
  repository:
    repository: volsync-maintenance-secret
