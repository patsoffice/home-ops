---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: silence-operator
rules:
  - apiGroups: ["monitoring.giantswarm.io"]
    resources: ["silences"]
    verbs: ["*"]
  - apiGroups: ["observability.giantswarm.io"]
    resources: ["silences"]
    verbs: ["*"]
  - apiGroups: ["observability.giantswarm.io"]
    resources: ["silences/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: silence-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: silence-operator
subjects:
  - kind: ServiceAccount
    name: silence-operator
    namespace: observability
