---
web:
  port: ${WEB_PORT}
storage:
  type: sqlite
  path: /config/sqlite.db
  caching: true
metrics: true
debug: false
ui:
  title: Status | Gatus
  header: Status
connectivity:
  checker:
    target: 9.9.9.9:53
    interval: 1m
endpoints:
  - name: nas0-nfs
    group: infrastructure
    url: tcp://nas0.internal:2049
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
  - name: nas0-smb
    group: infrastructure
    url: tcp://nas0.internal:445
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
