---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: wordpress-poc-cron
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: wp-cron
              # renovate: datasource=docker depName=curlimages/curl
              image: docker.io/curlimages/curl:8.19.0@sha256:9a6f6a17667960e077f1b153009aaf18ac99a622221084e1938a45a06fff057a
              command: ["curl", "-fsS", "--retry", "3", "--retry-delay", "5", "--retry-all-errors", "http://wordpress-poc.self-hosted.svc.cluster.local/wp-cron.php"]
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  memory: 32Mi
          restartPolicy: Never
