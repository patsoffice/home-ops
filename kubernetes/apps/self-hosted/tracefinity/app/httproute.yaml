---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tracefinity
  annotations:
    gethomepage.dev/description: "Tracefinity generates Gridfinity bins from photos of tools."
    gethomepage.dev/enabled: "true"
    gethomepage.dev/icon: mdi-printer-3d
    gethomepage.dev/group: Apps
    gethomepage.dev/name: Tracefinity
spec:
  hostnames:
    - "tracefinity.${SECRET_DOMAIN}"
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - backendRefs:
        - name: tracefinity
          namespace: self-hosted
          port: ${APP_PORT}
