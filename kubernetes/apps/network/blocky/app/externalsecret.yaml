---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: blocky
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: blocky-db-app
    template:
      data:
        # Blocky query log
        DB_URI: "postgres://{{ .BLOCKY_POSTGRES_USER }}:{{ .BLOCKY_POSTGRES_PASS | urlquery }}@postgres17-rw.database.svc.cluster.local/blocky?sslmode=disable"
        # Postgres Init
        INIT_POSTGRES_DBNAME: blocky
        INIT_POSTGRES_HOST: postgres17-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .BLOCKY_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .BLOCKY_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        # Blocky config with DB URI baked in
        config.yaml: |
          upstreams:
            groups:
              default:
                - https://one.one.one.one/dns-query
                - https://dns.quad9.net/dns-query
          conditional:
            mapping:
              ${SECRET_DOMAIN}: tcp+udp:192.168.6.100
          customDNS:
            mapping:
              brother-printer.internal: 192.168.7.153
              nas0.internal: 192.168.1.0
              nas1.internal: 192.168.1.0
              pve001.internal: 192.168.1.1
              pve002.internal: 192.168.1.2
              pve005.internal: 192.168.1.5
          blocking:
            denylists:
              ads:
                - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
            clientGroupsBlock:
              default:
                - ads
            loading:
              refreshPeriod: 4h
          queryLog:
            type: postgresql
            target: postgres://{{ .BLOCKY_POSTGRES_USER }}:{{ .BLOCKY_POSTGRES_PASS | urlquery }}@postgres17-rw.database.svc.cluster.local/blocky?sslmode=disable
            logRetentionDays: 30
            creationAttempts: 3
            creationCooldown: 2s
            flushInterval: 30s
          ports:
            dns: 53
            http: 4000
          log:
            level: info
          prometheus:
            enable: true
            path: /metrics
  dataFrom:
    - extract:
        key: blocky
    - extract:
        key: cloudnative-pg
