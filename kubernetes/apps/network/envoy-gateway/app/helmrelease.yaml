---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  interval: 1h
  install:
    crds: Create
  upgrade:
    # Create (not CreateReplace): the v1.8.0 chart ships the safe-upgrades
    # ValidatingAdmissionPolicy in its CRD set, and Flux's CreateReplace looks it
    # up as kind CustomResourceDefinition, fails ("not found"), and aborts every
    # upgrade. Create still installs missing CRDs but skips the broken replace.
    crds: Create
  values:
    global:
      imageRegistry: mirror.gcr.io
    config:
      envoyGateway:
        extensionApis:
          enableBackend: true
          enableEnvoyPatchPolicy: true
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              # NOTE: keep GatewayNamespace. ControlPlaneNamespace renames the managed
              # gateway LB Services (envoy-internal -> envoy-network-envoy-internal-*),
              # which drops their Cilium L2 IP announcement and blackholes the gateway
              # VIPs (192.168.6.202/.203). The stale-endpoint/JWT-xDS issue must be
              # solved without changing deploy mode.
              type: GatewayNamespace
