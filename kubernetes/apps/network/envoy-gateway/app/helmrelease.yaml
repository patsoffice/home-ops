---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  interval: 1h
  install:
    crds: Create
  upgrade:
    # Create (not CreateReplace): the v1.8.0 chart ships the safe-upgrades
    # ValidatingAdmissionPolicy in its CRD set, and Flux's CreateReplace looks it
    # up as kind CustomResourceDefinition, fails ("not found"), and aborts every
    # upgrade. Create still installs missing CRDs but skips the broken replace.
    crds: Create
  values:
    global:
      imageRegistry: mirror.gcr.io
    config:
      envoyGateway:
        extensionApis:
          enableBackend: true
          enableEnvoyPatchPolicy: true
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              # ControlPlaneNamespace (the default) co-locates the proxies with the
              # controller in this namespace without the GatewayNamespace mode's
              # JWT-secured xDS channel, whose 1h SA-token expiry intermittently froze
              # proxy config and left them dialing stale (dead) upstream pod IPs.
              type: ControlPlaneNamespace
